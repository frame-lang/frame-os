# Build config for the freestanding user program.
#
# Built for the bare-metal target with our linker script. `relocation-model =
# static` + the fixed base in linker.ld produce a non-PIE ET_EXEC the kernel's
# ElfLoader can map at the program headers' p_vaddr. `-z max-page-size=0x1000`
# keeps PT_LOAD segments 4K-aligned (not the 2MB default) so the baked ELF stays
# small and maps page-granular.
[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=-z",
    "-C", "link-arg=max-page-size=0x1000",
]
