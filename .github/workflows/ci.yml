name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # The hosted-track build and test. Runs on Linux, macOS, and Windows so we
  # catch host-platform-specific issues early.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install framec
        run: cargo install framec

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # --exclude frame-os-kernel: the kernel crate is bare-metal-only
      # (target x86_64-unknown-none) and can't build for the host. The
      # `kernel-build` job below covers it explicitly.
      - name: Clippy
        run: cargo clippy --workspace --exclude frame-os-kernel --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude frame-os-kernel

      - name: Test
        run: cargo test --workspace --exclude frame-os-kernel

  # Kernel cross-build: ensures the bare-metal kernel compiles for its
  # target. Doesn't actually boot it (that would need QEMU + Limine, which
  # is covered by `xtask qemu-test` once that lands at B0 Step 4).
  kernel-build:
    name: kernel build (x86_64-unknown-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-kernel-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build kernel
        run: cargo build -p frame-os-kernel --target x86_64-unknown-none

  # Diagram drift check — runs only on Linux because GraphViz is easiest to
  # install there in CI. The check is the same on every platform, so this
  # is fine.
  diagrams:
    name: diagram drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install framec
        run: cargo install framec

      - name: Install GraphViz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Check diagrams
        run: cargo xtask check-diagrams
