name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # The hosted-track build and test. Runs on Linux, macOS, and Windows so we
  # catch host-platform-specific issues early.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install framec
        run: cargo install framec

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # --exclude frame-os-kernel: the kernel crate is bare-metal-only
      # (target x86_64-unknown-none) and can't build for the host. The
      # `kernel-build` job below covers it explicitly.
      - name: Clippy
        run: cargo clippy --workspace --exclude frame-os-kernel --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude frame-os-kernel

      - name: Test
        run: cargo test --workspace --exclude frame-os-kernel

  # Kernel cross-build: ensures the bare-metal kernel compiles for its
  # target. Doesn't actually boot it; that's the qemu-test job below.
  kernel-build:
    name: kernel build (x86_64-unknown-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      # The kernel's build.rs runs framec on the Frame sources, and building
      # the kernel triggers the nested user-crate build (which also runs
      # framec on parser.frs for the ring-3 Parser reuse). Both need framec.
      - name: Install framec
        run: cargo install framec
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-kernel-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build kernel
        run: cargo build -p frame-os-kernel --target x86_64-unknown-none

  # QEMU smoke tests — boot the kernel under headless QEMU UEFI, assert
  # the captured serial output contains the expected banner and no
  # panic markers. Runs only on Linux because QEMU is most reliable
  # there in CI (macOS would need OVMF firmware paths from brew, which
  # GitHub's macOS runners don't ship by default). The xtask
  # subcommand fetches Limine binaries on first run and caches them.
  qemu-test:
    name: qemu smoke tests
    runs-on: ubuntu-latest
    needs: kernel-build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      # qemu-test builds the kernel (and the nested user crate), both of which
      # run framec in their build scripts.
      - name: Install framec
        run: cargo install framec
      - name: Install QEMU + OVMF + mtools
        # qemu-system-x86 ships qemu-system-x86_64; ovmf provides
        # /usr/share/OVMF/OVMF_CODE.fd + OVMF_VARS.fd which find_ovmf
        # discovers via the /usr/share/OVMF candidate path.
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf mtools
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-qemu-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache Limine binaries
        uses: actions/cache@v4
        with:
          path: target/limine
          key: limine-v11.x-binary
      - name: Run QEMU smoke tests
        run: cargo xtask qemu-test
      - name: Upload serial captures on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-smoke-serial-logs
          path: target/qemu-smoke/*.log

  # Diagram drift check — runs only on Linux because GraphViz is easiest to
  # install there in CI. The check is the same on every platform, so this
  # is fine.
  diagrams:
    name: diagram drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install framec
        run: cargo install framec

      - name: Install GraphViz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Check diagrams
        run: cargo xtask check-diagrams
